services:
  mysql:
    image: mysql:8.0
    container_name: corresp_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password_prod
      MYSQL_DATABASE: correspondencia_unificada
      MYSQL_USER: unificada_user
      MYSQL_PASSWORD: unificada_password
    volumes:
      - corresp_mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - corresp_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: corresp_backend
    restart: unless-stopped
    environment:
      - APP_NAME=Correspondencia Unificada
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=https://doc.australbyte.cl
      - APP_KEY=
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=correspondencia_unificada
      - DB_USERNAME=unificada_user
      - DB_PASSWORD=unificada_password
      - SESSION_DRIVER=file
      - SANCTUM_STATEFUL_DOMAINS=doc.australbyte.cl
      - CORS_ALLOWED_ORIGINS=https://doc.australbyte.cl
    volumes:
      - corresp_storage:/var/www/html/storage/app/public
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - corresp_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: corresp_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - corresp_network

volumes:
  corresp_mysql_data:
  corresp_storage:

networks:
  corresp_network:
    driver: bridge
