# Rate limit anti-scraping para el endpoint publico de verificacion
limit_req_zone $binary_remote_addr zone=verif:10m rate=10r/s;

server {
    listen 8082;
    server_name verificar.imcabodehornos.cl _;

    root /usr/share/nginx/html;
    index index.html;

    # Unico endpoint del CT106 expuesto (via tunel SSH inverso en 127.0.0.1:8090)
    location /api/verificar-documento/ {
        limit_req zone=verif burst=20 nodelay;
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 8s;
        proxy_read_timeout 12s;
    }

    # Cualquier otra ruta /api queda bloqueada (no exponemos gestion ni auth)
    location /api/ { return 404; }

    # Pagina de verificacion (una sola pagina; /verificar/CODIGO tambien la sirve)
    location / {
        try_files $uri /index.html;
    }
}
