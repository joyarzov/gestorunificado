version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: unificada_mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: correspondencia_unificada
      MYSQL_USER: unificada_user
      MYSQL_PASSWORD: unificada_password
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - unificada_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: unificada_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor
    environment:
      - APP_NAME=Correspondencia Unificada
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_KEY=base64:xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx=
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=correspondencia_unificada
      - DB_USERNAME=unificada_user
      - DB_PASSWORD=unificada_password
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - unificada_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: unificada_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=/api
    depends_on:
      - backend
    networks:
      - unificada_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: unificada_phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: unificada_user
      PMA_PASSWORD: unificada_password
      UPLOAD_LIMIT: 100M
    depends_on:
      - mysql
    networks:
      - unificada_network

volumes:
  mysql_data:

networks:
  unificada_network:
    driver: bridge
